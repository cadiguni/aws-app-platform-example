name: App Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/app-deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      deploy_env: ${{ steps.deploy_env.outputs.deploy_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy environment
        id: deploy_env
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_env=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::229371276586:role/github-actions-aws-app-platform
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY: aws-app-platform
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" > /dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" > /dev/null

      - name: Build and push image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login_ecr.outputs.registry }}
          ECR_REPOSITORY: aws-app-platform
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URI" ./app
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    name: Terraform Apply (${{ needs.build_and_push.outputs.deploy_env }})
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: ${{ needs.build_and_push.outputs.deploy_env }}
    defaults:
      run:
        working-directory: infra/envs/${{ needs.build_and_push.outputs.deploy_env }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_project_name: "aws-app-platform"
      TF_VAR_container_image: ${{ needs.build_and_push.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::229371276586:role/github-actions-aws-app-platform
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Terraform init
        run: terraform init -input=false -reconfigure

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -no-color
